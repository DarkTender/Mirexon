<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(120deg, #15181e 40%, #192f46 100%);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-container {
      background: rgba(24,32,54,0.9);
      border-radius: 2rem;
      box-shadow: 0 6px 32px rgba(0,255,255,0.12), 0 1.5px 1rem rgba(0,255,255,.15);
      border: 2px solid rgba(0,255,255,0.22);
      padding: 2.5rem 2.2rem 1.4rem 2.2rem;
      min-width: 320px;
      max-width: 390px;
      animation: riseIn 1.1s cubic-bezier(0.75, 0.2, 0.3, 0.98);
      transition: box-shadow 0.34s;
      position: relative;
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(54px) scale(.95);}
      to   { opacity: 1; transform: translateY(0) scale(1);}
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 0.9rem;
      animation: logoPop 1.5s cubic-bezier(.3,1.9,.5,1.1);
    }
    @keyframes logoPop {
      0% { opacity: 0; transform: scale(0);}
      70% { opacity: 1; transform: scale(1.08);}
      100% { transform: scale(1);}
    }
    .auth-logo svg {
      width: 55px;
      height: 55px;
      fill: #00ffe1;
      filter: drop-shadow(0 2px 14px #00ffe1bb);
    }
    .auth-title {
      color: #00ffe1;
      letter-spacing: 1.5px;
      font-size: 1.5rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 1.25rem;
      margin-top: -.3rem;
    }
    .form-control {
      background: rgba(45,52,80,0.83)!important;
      color: #e4e9fe;
      border: 1.4px solid #0fffb3;
      border-radius: 1.25rem;
      font-size: 1.05rem;
      padding-left: 1.1rem;
      padding-right: 2.4rem;
      box-shadow: 0 1px 8px rgba(0,255,255,.07);
      transition: border 0.18s;
    }
    .form-control:focus {
      border: 1.7px solid #00ffe1;
      background: rgba(35,52,77, 0.93)!important;
      box-shadow: 0 0 20px #00ffe173;
      color: #1fffc3;
    }
    .form-control::placeholder {
      color: #a4e5e5;
      opacity: 0.46;
      font-size:1rem;
      letter-spacing:0.03em;
    }
    .show-password-toggle {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #00ffe1;
      z-index: 3;
      font-size:1.18em;
      transition: color 0.15s;
    }
    .show-password-toggle:hover {
      color: #0fffb3;
    }
    .forgot-link {
      color:#1f98fa;
      text-decoration: underline;
      font-size: 0.96rem;
    }
    .auth-btn {
      background: linear-gradient(90deg,#00ffe1 0%,#1f98fa 100%);
      border: none;
      color: #23243d;
      font-weight: 600;
      border-radius: 1.1rem;
      padding: 0.56rem 1.2rem;
      box-shadow: 0 2px 14px #00ffe16a;
      transition: background 0.17s, box-shadow 0.13s;
    }
    .auth-btn:hover, .auth-btn:focus {
      background: linear-gradient(90deg,#1f98fa 0%,#00ffd0 100%);
      color: #181824;
      box-shadow: 0 2px 28px #00ffe111;
    }
    .toggle-link {
      cursor: pointer;
      color: #00ffe1;
      text-decoration: underline;
      font-size: 1.07rem;
      margin-top: 1rem;
      display: inline-block;
      transition: color 0.18s;
    }
    .toggle-link:hover {
      color: #1f98fa;
    }
    .other-box {
      background: rgba(36, 38, 60, 0.9);
      border-radius: 1.1rem;
      border: 2px solid #1f98fa30;
      margin-top: 1.2rem;
      text-align: center;
      box-shadow: 0 2px 14px #00ffd04c;
      padding: 1.08rem 0.7rem;
      animation: fadeProvider 1.1s cubic-bezier(.7,.2,.3,.8);
    }
    @keyframes fadeProvider {
      0% { opacity: 0; transform: translateY(-30px) scale(.95);}
      100% { opacity: 1; transform: translateY(0) scale(1);}
    }
    .provider-btn {
      margin: 0.13rem;
      border-radius: 0.94rem;
      font-size: 1.04rem;
      width: 80%;
      box-shadow: none;
      background: rgba(76,110,255,0.08);
      color: #e6e7ef;
      border: 1.25px solid #00ffe1;
      transition: transform 0.18s, box-shadow 0.17s;
      position: relative;
    }
    .provider-btn:hover {
      transform: scale(1.04) translateY(-2px);
      box-shadow: 0 2px 16px #1f98fa38;
      background: linear-gradient(90deg,#fff 0%,#0fffb3 100%);
      color: #181824;
    }
    .provider-icon {
      vertical-align: middle;
      margin-right: 10px;
      font-size: 1.16em;
      position:relative;
      top:-2px;
    }
    .auth-footer {
      text-align:center;
      margin-top:2.3rem;
      color:#8490b6;
      font-size:0.93rem;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
        <ellipse cx="30" cy="33" rx="19.5" ry="21" fill="#00ffe1" opacity="0.13"/>
        <ellipse cx="30" cy="28" rx="10" ry="10" fill="#00ffe1" opacity="0.28"/>
        <ellipse cx="30" cy="27.7" rx="5.3" ry="5.3" fill="#00ffe1"/>
      </svg>
    </div>
    <div class="auth-title" id="authTitle">Prihlásenie</div>
    <form id="loginForm" autocomplete="off" style="display:block;">
      <div class="mb-3 position-relative">
        <input type="email" class="form-control" id="loginEmail" placeholder="Váš e-mail" required>
      </div>
      <div class="mb-2 position-relative">
        <input type="password" class="form-control" id="loginPassword" placeholder="Heslo" required>
        <span class="show-password-toggle" onclick="togglePassword('loginPassword', this)" title="Zobraziť/Zakryť heslo"><i class="bi bi-eye-fill"></i></span>
      </div>
      <div class="d-flex justify-content-between align-items-center mb-3">
        <a href="#" class="forgot-link" onclick="showReset()">Zabudnuté heslo?</a>
      </div>
      <button type="submit" class="btn auth-btn w-100 mb-2">Prihlásiť sa</button>
      <div class="text-end">
        <span class="toggle-link" onclick="toggleForm()">Nemáte účet? Registrujte sa</span>
      </div>
    </form>
    <form id="registerForm" autocomplete="off" style="display:none;">
      <div class="mb-3 position-relative">
        <input type="email" class="form-control" id="registerEmail" placeholder="Váš e-mail" required>
      </div>
      <div class="mb-3 position-relative">
        <input type="text" class="form-control" id="registerUsername" placeholder="Používateľské meno" required>
      </div>
      <div class="mb-2 position-relative">
        <input type="password" class="form-control" id="registerPassword" placeholder="Heslo" required>
        <span class="show-password-toggle" onclick="togglePassword('registerPassword', this)" title="Zobraziť/Zakryť heslo"><i class="bi bi-eye-fill"></i></span>
      </div>
      <button type="submit" class="btn auth-btn w-100 mb-2">Registrovať sa</button>
      <div class="text-end">
        <span class="toggle-link" onclick="toggleForm()">Máte účet? Prihláste sa</span>
      </div>
    </form>
    <form id="resetForm" autocomplete="off" style="display:none;">
      <div class="mb-3 position-relative">
        <input type="email" class="form-control" id="resetEmail" placeholder="Váš e-mail" required>
      </div>
      <button type="submit" class="btn auth-btn w-100 mb-2">Obnoviť heslo</button>
      <div class="text-end">
        <span class="toggle-link" onclick="showLogin()">Naspäť na prihlasovanie</span>
      </div>
    </form>
    <div class="other-box">
      <div class="fw-bold mb-2" style="color:#abdce0">
        Prihlásiť sa cez
      </div>
      <button class="btn provider-btn" type="button" onclick="providerAnim('google')" id="googleBtn">
        <span class="provider-icon">
          <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" style="width:22px;vertical-align:middle">
        </span>
        Google
      </button>
      <button class="btn provider-btn" type="button" onclick="providerAnim('apple')" id="appleBtn">
        <span class="provider-icon"><i class="bi bi-apple" style="font-size:22px;"></i></span>
        Apple
      </button>
    </div>
    <div class="auth-footer">
      &copy; 2025 MIREXON™</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function providerAnim(provider) {
      let btn = document.getElementById(provider + 'Btn');
      btn.style.boxShadow = "0 0 28px #00ffd0";
      btn.style.transform = "scale(1.08)";
      setTimeout(()=> {
        btn.style.boxShadow = "";
        btn.style.transform = "";
      }, 420);
      alert("Prihlásenie cez " + (provider === "google" ? "Google" : "Apple"));
    }
    function togglePassword(id, el) {
      let input = document.getElementById(id);
      if (input.type === "password") {
        input.type = "text";
        el.innerHTML = "<i class='bi bi-eye-slash-fill'></i>";
      } else {
        input.type = "password";
        el.innerHTML = "<i class='bi bi-eye-fill'></i>";
      }
    }
    function toggleForm() {
      let loginForm = document.getElementById('loginForm');
      let registerForm = document.getElementById('registerForm');
      let resetForm = document.getElementById('resetForm');
      let title = document.getElementById('authTitle');
      if (loginForm.style.display !== "none") {
        loginForm.style.display = "none";
        registerForm.style.display = "block";
        resetForm.style.display = "none";
        title.innerText = "Registrácia";
      } else {
        loginForm.style.display = "block";
        registerForm.style.display = "none";
        resetForm.style.display = "none";
        title.innerText = "Prihlásenie";
      }
    }
    function showReset() {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'block';
      document.getElementById('authTitle').innerText = "Obnova hesla";
    }
    function showLogin() {
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('registerForm').style.display = 'none';
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('authTitle').innerText = "Prihlásenie";
    }
    // Validácie demo
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert("Prihlasujete sa...");
    });
    document.getElementById('registerForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert("Registrujete sa...");
    });
    document.getElementById('resetForm').addEventListener('submit', function(e){
      e.preventDefault();
      alert("Link na obnovenie hesla bol odoslaný.");
    });
  </script>
</body>
<script>
function redirectBackIfNotLoggedIn() {
  const isLoggedIn = false; 
  if (!isLoggedIn) {
    history.back(); 
  }
}
</script>
</html>
