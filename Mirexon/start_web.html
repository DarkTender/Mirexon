<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MIREXON™ - Loading</title>
  <style>
    body {
      margin: 0;
      background: #000;
      font-family: 'Orbitron', sans-serif;
    }

    #intro-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #000, #001122);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #00ffe1;
      text-align: center;
      z-index: 9999;
      transition: opacity 1s;
    }

    #intro-loader.fade-out {
      opacity: 0;
    }

    .loader-title {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 1rem;
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {

      0%,
      100% {
        text-shadow: 0 0 20px #00ffe1;
      }

      50% {
        text-shadow: 0 0 40px #74C0FC;
      }
    }

    .loader-text {
      font-size: 1.2rem;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div id="intro-loader">
    <h1 class="loader-title">MIREXON™</h1>
    <p class="loader-text">Loading neural systems...</p>
  </div>
  <script>
    console.log('Loader spustený');
    setTimeout(() => {
      console.log('Fade-out');
      document.getElementById('intro-loader').classList.add('fade-out');
      setTimeout(() => {
        console.log('PRESMERUJEM na index.html');
        window.location.href = 'index.html';
      }, 1000);
    }, 3500);
  </script>
</body>

</html>
